id: com.github.rtr46.meikipop
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
base: com.riverbankcomputing.PyQt.BaseApp
base-version: "6.10"
command: meikipop
cleanup-commands:
  - /app/cleanup-BaseApp.sh
finish-args:
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher
modules:
  - name: pycairo
    buildsystem: meson
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/22/d9/1728840a22a4ef8a8f479b9156aa2943cd98c3907accd3849fb0d5f82bfd/pycairo-1.29.0.tar.gz
        sha256: f3f7fde97325cae80224c09f12564ef58d0d0f655da0e3b040f5807bd5bd3142

  - name: pygobject
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/pygobject/3.56/pygobject-3.56.2.tar.gz
        sha256: b816098969544081de9eecedb94ad6ac59c77e4d571fe7051f18bebcec074313

  - python3-deps.yaml

  - name: meikipop
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=. --prefix=/app --no-build-isolation
        --no-deps .
      - install -Dm644 com.github.rtr46.meikipop.desktop /app/share/applications/com.github.rtr46.meikipop.desktop
      - install -Dm644 com.github.rtr46.meikipop.metainfo.xml /app/share/metainfo/com.github.rtr46.meikipop.metainfo.xml
      - install -Dm644 icons/hicolor/48x48/apps/com.github.rtr46.meikipop.png /app/share/icons/hicolor/48x48/apps/com.github.rtr46.meikipop.png
      - install -Dm644 icons/hicolor/64x64/apps/com.github.rtr46.meikipop.png /app/share/icons/hicolor/64x64/apps/com.github.rtr46.meikipop.png
      - install -Dm644 icons/hicolor/128x128/apps/com.github.rtr46.meikipop.png /app/share/icons/hicolor/128x128/apps/com.github.rtr46.meikipop.png
      - install -Dm644 icons/hicolor/256x256/apps/com.github.rtr46.meikipop.png /app/share/icons/hicolor/256x256/apps/com.github.rtr46.meikipop.png
    sources:
      - type: dir
        path: .
